services:
  postgres:
    image: postgres:16
    container_name: taskalign_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - taskalign_pgdata:/var/lib/postgresql/data

volumes:
  taskalign_pgdata: